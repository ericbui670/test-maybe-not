<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OS | Personal Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --error: #ef4444; }
        body { font-family: 'Space Grotesk', sans-serif; background: #0f172a; color: white; transition: all 0.5s ease; overflow: hidden; height: 100vh; }
        
        /* Themes */
        .theme-base { background: radial-gradient(circle at top left, #1e293b, #0f172a); }
        .theme-science { background: linear-gradient(135deg, #064e3b 0%, #020617 100%); border-top: 5px solid #34d399; }
        .theme-car { background: linear-gradient(135deg, #450a0a 0%, #000000 100%); border-top: 5px solid #ef4444; }
        .theme-aviation { background: linear-gradient(180deg, #0c4a6e 0%, #082f49 100%); border-top: 5px solid #38bdf8; }

        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Toast System */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .toast { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-weight: 600; opacity: 0; transform: translateY(-20px); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast-error { border-left: 4px solid var(--error); color: var(--error); }
        .toast-success { border-left: 4px solid var(--accent); color: var(--accent); }

        /* Task Sidebar Ghost Trigger */
        #task-trigger { position: fixed; right: 0; top: 0; height: 100%; width: 12px; z-index: 40; cursor: pointer; display: flex; align-items: center; justify-content: flex-end; }
        #task-trigger:hover #trigger-arrow { opacity: 1; transform: translateX(0); }
        #trigger-arrow { opacity: 0; transform: translateX(10px); transition: 0.3s; color: var(--accent); font-size: 24px; padding-right: 5px; }

        #task-sidebar { position: fixed; right: -380px; top: 0; width: 350px; height: 100%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 45; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #task-sidebar.open { right: 0; }

        .day-column { background: rgba(15, 23, 42, 0.4); border-radius: 20px; padding: 15px; min-height: 500px; border: 1px solid rgba(255,255,255,0.05); min-width: 180px; }
        .entry-card { margin-bottom: 8px; border-left: 4px solid; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .entry-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.1); }

        /* Flappy Game */
        #flappy-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        canvas { border: 4px solid #334155; border-radius: 20px; box-shadow: 0 0 50px rgba(16, 185, 129, 0.2); background: #000; }

        .modal-backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); position: fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:110; }
        .btn-primary { background: #10b981; color: white; font-weight: bold; border-radius: 12px; transition: 0.2s; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-full theme-base">

<div id="toast-container"></div>

<div id="auth-page" class="modal-backdrop">
    <div class="glass p-10 rounded-[32px] w-[380px] text-center shadow-2xl border-emerald-500/30">
        <h1 id="auth-title" class="text-4xl font-black text-emerald-400 mb-2 tracking-tighter">NEXUS OS</h1>
        <div class="space-y-4">
            <input type="text" id="auth-name" placeholder="Name" class="w-full bg-slate-900/50 p-4 rounded-2xl border border-slate-700 focus:border-emerald-500 outline-none transition-all uppercase text-center font-bold">
            <input type="password" id="auth-pin" maxlength="4" placeholder="PIN" class="w-full bg-slate-900/50 p-4 rounded-2xl border border-slate-700 text-center tracking-[1em] focus:border-emerald-500 outline-none font-bold">
            <button onclick="handleAuth()" id="auth-btn" class="w-full btn-primary p-4 text-lg">Sign In</button>
            <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-xs text-emerald-400 hover:underline">Need an account? Sign Up</button>
        </div>
    </div>
</div>

<div id="main-app" class="hidden h-full flex flex-col p-8">
    <header class="flex justify-between items-end mb-8">
        <div>
            <p class="text-emerald-400 font-bold tracking-widest text-xs uppercase mb-1">Authenticated Session</p>
            <h1 id="display-user" class="text-5xl font-black uppercase tracking-tight">USER</h1>
        </div>
        <div class="flex gap-3">
            <select onchange="setTheme(this.value)" id="theme-select" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-xs font-bold outline-none">
                <option value="base">Default</option>
                <option value="science">Science</option>
                <option value="car">Car</option>
                <option value="aviation">Aviation</option>
            </select>
            <button onclick="logout()" class="bg-red-500/10 text-red-400 border border-red-500/50 px-5 py-3 rounded-xl font-bold">LOGOUT</button>
        </div>
    </header>

    <div id="timetable-grid" class="flex gap-4 overflow-x-auto pb-6 flex-1"></div>

    <div class="mt-4 flex gap-4">
        <button onclick="openPinPad()" class="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black shadow-lg">SECURE TERMINAL</button>
        <button onclick="askConfirm('Wipe all local entries?', () => clearAllEvents())" class="bg-slate-800 border border-slate-700 px-8 py-4 rounded-2xl font-bold">CLEAR CACHE</button>
    </div>
</div>

<div id="task-trigger" onmouseenter="toggleTasks(true)"><div id="trigger-arrow">◀</div></div>
<aside id="task-sidebar" class="glass p-8 flex flex-col" onmouseleave="toggleTasks(false)">
    <h3 class="text-2xl font-bold mb-6 italic">Task Hub</h3>
    <div class="space-y-3 mb-8">
        <input type="text" id="task-input" placeholder="New task..." class="w-full bg-slate-900/50 p-3 rounded-xl border border-slate-700 outline-none">
        <select id="task-day-select" class="w-full bg-slate-900/50 p-3 rounded-xl border border-slate-700 outline-none text-sm">
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
        </select>
        <button onclick="addTask()" class="w-full btn-primary py-3 font-bold">Add Task</button>
    </div>
    <div id="task-list" class="flex-1 overflow-y-auto space-y-3"></div>
</aside>

<div id="event-modal" class="modal-backdrop hidden">
    <div class="glass p-8 rounded-3xl w-[400px]">
        <h2 id="modal-title" class="text-2xl font-bold mb-6">Modify Entry</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="time" id="ev-start" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
                <input type="time" id="ev-end" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
            </div>
            <input type="text" id="ev-subject" placeholder="Activity Name" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
            <input type="text" id="ev-room" placeholder="Location" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
            <div class="flex gap-2 pt-4">
                <button onclick="saveEvent()" class="flex-1 btn-primary py-4">Save Entry</button>
                <button id="single-delete-btn" onclick="deleteCurrentEvent()" class="bg-red-500/10 text-red-500 border border-red-500/50 px-4 rounded-xl font-bold hidden">Delete</button>
            </div>
            <button onclick="closeModals()" class="w-full text-slate-500 text-xs py-2">Cancel</button>
        </div>
    </div>
</div>

<div id="notif-popup" class="modal-backdrop hidden !z-[200]">
    <div class="glass p-8 rounded-[40px] w-96 text-center border-2 border-emerald-500 shadow-2xl">
        <div class="text-5xl mb-4">🔔</div>
        <h2 class="text-2xl font-black mb-2 uppercase">Time Reminder</h2>
        <p id="notif-text" class="text-slate-300 mb-8">Task is due now.</p>
        <div class="flex gap-3">
            <button onclick="ackNotif()" class="flex-1 btn-primary py-4">ACKNOWLEDGE</button>
            <button onclick="snoozeNotif()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold">SNOOZE (1m)</button>
        </div>
    </div>
</div>

<div id="flappy-container">
    <div class="mb-4 flex items-center gap-10">
        <h2 class="text-2xl font-black italic">NEXUS_WING</h2>
        <div class="text-emerald-400 font-bold">SCORE: <span id="live-score">0</span></div>
    </div>
    <canvas id="flappy-canvas" width="400" height="600"></canvas>
    <button onclick="closeFlappy()" class="mt-6 text-slate-500 text-sm hover:text-white transition">Terminate Link</button>
</div>

<div id="pin-modal" class="modal-backdrop hidden">
    <div class="glass p-8 rounded-[40px] text-center">
        <h3 class="text-emerald-400 font-bold mb-4 tracking-widest">ENTER ACCESS CODE</h3>
        <div id="pin-display" class="text-4xl mb-6 tracking-[0.5em] font-black text-white">____</div>
        <div class="grid grid-cols-3 gap-3 max-w-[200px] mx-auto">
            <button onclick="typePin('1')" class="bg-slate-800 p-4 rounded-xl font-bold">1</button>
            <button onclick="typePin('2')" class="bg-slate-800 p-4 rounded-xl font-bold">2</button>
            <button onclick="typePin('3')" class="bg-slate-800 p-4 rounded-xl font-bold">3</button>
            <button onclick="typePin('4')" class="bg-slate-800 p-4 rounded-xl font-bold">4</button>
            <button onclick="typePin('5')" class="bg-slate-800 p-4 rounded-xl font-bold">5</button>
            <button onclick="typePin('6')" class="bg-slate-800 p-4 rounded-xl font-bold">6</button>
            <button onclick="typePin('7')" class="bg-slate-800 p-4 rounded-xl font-bold">7</button>
            <button onclick="typePin('8')" class="bg-slate-800 p-4 rounded-xl font-bold">8</button>
            <button onclick="typePin('9')" class="bg-slate-800 p-4 rounded-xl font-bold">9</button>
            <button onclick="clearPin()" class="bg-red-500/20 text-red-500 p-4 rounded-xl font-bold col-span-2">CLEAR</button>
            <button onclick="closeModals()" class="bg-slate-700 p-4 rounded-xl font-bold">✕</button>
        </div>
    </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('nexus_db') || '{}');
let currentUser = null;
let isSignUp = false;
let currentEditId = null, currentDay = null, currentPin = '';
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// --- SYSTEM TOAST NOTIFICATIONS ---
function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span>${type === 'error' ? '❌' : '⚡'}</span> ${msg}`;
    container.appendChild(toast);
    
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
    }, 3000);
}

// --- AUTH LOGIC ---
window.onload = () => {
    const last = localStorage.getItem('last_user');
    if (last && users[last]) document.getElementById('auth-name').value = last;
};

function toggleAuthMode() {
    isSignUp = !isSignUp;
    document.getElementById('auth-title').textContent = isSignUp ? "REGISTRY" : "NEXUS OS";
    document.getElementById('auth-toggle-btn').textContent = isSignUp ? "Already have an account? Sign In" : "Need an account? Sign Up";
}

function handleAuth() {
    const name = document.getElementById('auth-name').value.trim().toLowerCase();
    const pin = document.getElementById('auth-pin').value;

    if (!name) return showToast("Name cannot be empty", "error");
    if (pin.length !== 4) return showToast("Enter 4-digit PIN", "error");

    if (isSignUp) {
        if (users[name]) return showToast("Username already exists", "error");
        users[name] = { pin, theme: 'base', events: [], tasks: [] };
        showToast("Account Registered Successfully");
    } else {
        if (!users[name] || users[name].pin !== pin) return showToast("Incorrect Name or PIN", "error");
        showToast(`Welcome back, ${name.toUpperCase()}`);
    }

    currentUser = name;
    localStorage.setItem('last_user', name);
    document.getElementById('auth-page').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('display-user').textContent = name;
    setTheme(users[currentUser].theme); 
    renderAll(); 
    startNotifEngine();
}

function logout() { location.reload(); }
function save() { localStorage.setItem('nexus_db', JSON.stringify(users)); }

function setTheme(t) { 
    document.body.className = `h-full theme-${t}`; 
    if(currentUser) { users[currentUser].theme = t; save(); } 
}

// --- TIMETABLE & TASKS ---
function renderTimetable() {
    const grid = document.getElementById('timetable-grid'); 
    grid.innerHTML = '';
    DAYS.forEach(day => {
        const col = document.createElement('div'); 
        col.className = 'day-column';
        col.innerHTML = `<h3 class="text-center font-black text-emerald-400 mb-5 tracking-widest text-xs uppercase">${day}</h3>`;
        
        users[currentUser].events.filter(e => e.day === day).sort((a,b)=>a.start.localeCompare(b.start)).forEach(e => {
            const card = document.createElement('div'); card.className = 'entry-card'; card.style.borderColor = '#10b981';
            card.innerHTML = `<div class="text-[10px] text-slate-400 font-bold">${e.start} - ${e.end}</div><div class="font-bold text-sm">${e.subject}</div>`;
            card.onclick = () => openEventModal(day, e); col.appendChild(card);
        });

        const add = document.createElement('button'); 
        add.className = "w-full mt-4 py-2 border border-dashed border-slate-700 rounded-xl text-slate-500 text-[10px] font-bold";
        add.textContent = "+ ADD"; add.onclick = () => openEventModal(day); 
        col.appendChild(add);
        grid.appendChild(col);
    });
}

function openEventModal(day, ev=null) {
    currentDay = day; 
    currentEditId = ev ? ev.id : null;
    document.getElementById('event-modal').classList.remove('hidden');
    document.getElementById('ev-start').value = ev ? ev.start : '';
    document.getElementById('ev-end').value = ev ? ev.end : '';
    document.getElementById('ev-subject').value = ev ? ev.subject : '';
    document.getElementById('ev-room').value = ev ? ev.room : '';
    document.getElementById('single-delete-btn').classList.toggle('hidden', !ev);
}

function saveEvent() {
    const s=document.getElementById('ev-start').value, 
          e=document.getElementById('ev-end').value, 
          sub=document.getElementById('ev-subject').value;

    if(!s || !e || !sub) return showToast("Missing Time or Activity Name", "error");

    const newE = { id: currentEditId || Date.now(), day: currentDay, start: s, end: e, subject: sub, room: document.getElementById('ev-room').value };
    if(currentEditId) users[currentUser].events = users[currentUser].events.map(ev => ev.id === currentEditId ? newE : ev);
    else users[currentUser].events.push(newE);
    
    save(); 
    closeModals(); 
    renderTimetable();
    showToast("Entry Saved");
}

function deleteCurrentEvent() { 
    users[currentUser].events = users[currentUser].events.filter(ev => ev.id !== currentEditId); 
    save(); 
    closeModals(); 
    renderTimetable(); 
    showToast("Entry Deleted");
}

function clearAllEvents() { 
    users[currentUser].events = []; 
    users[currentUser].tasks = []; 
    save(); 
    renderAll(); 
    showToast("Cache Cleared");
}

function toggleTasks(s) { document.getElementById('task-sidebar').classList.toggle('open', s); }

function addTask() {
    const t = document.getElementById('task-input').value, d = document.getElementById('task-day-select').value;
    if(!t) return showToast("Task cannot be empty", "error");
    users[currentUser].tasks.push({ id: Date.now(), text: t, day: d });
    document.getElementById('task-input').value = ''; 
    save(); 
    renderTasks();
}

function renderTasks() {
    const l = document.getElementById('task-list'); l.innerHTML = '';
    [...users[currentUser].tasks].sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)).forEach(t => {
        const d = document.createElement('div'); d.className = "bg-white/5 p-4 rounded-2xl border border-white/10 flex justify-between items-center group";
        d.innerHTML = `<div><p class="text-[9px] font-black text-emerald-500 uppercase">${t.day}</p><p class="text-sm font-medium">${t.text}</p></div><button onclick="removeTask(${t.id})" class="text-red-500 opacity-0 group-hover:opacity-100 transition">✕</button>`;
        l.appendChild(d);
    });
}

function removeTask(id) { 
    users[currentUser].tasks = users[currentUser].tasks.filter(t => t.id !== id); 
    save(); 
    renderTasks(); 
}

// --- REFINED NOTIFICATIONS ---
let silencedOccurrences = new Set();
let activeNotifId = null;

function startNotifEngine() {
    setInterval(() => {
        const now = new Date(), timeStr = now.toTimeString().slice(0, 5), dayName = DAYS[(now.getDay() + 6) % 7];
        users[currentUser].events.forEach(e => {
            const occId = `ev-${e.id}-${timeStr}`;
            if (e.day === dayName && e.start === timeStr && !silencedOccurrences.has(occId)) triggerNotif(`Event Starting: ${e.subject}`, occId);
        });
    }, 1000);
}

function triggerNotif(msg, id) {
    if (!document.getElementById('notif-popup').classList.contains('hidden')) return;
    activeNotifId = id; 
    document.getElementById('notif-text').textContent = msg;
    document.getElementById('notif-popup').classList.remove('hidden');
}

function ackNotif() { 
    if (activeNotifId) silencedOccurrences.add(activeNotifId); 
    document.getElementById('notif-popup').classList.add('hidden'); 
    activeNotifId = null; 
}

function snoozeNotif() {
    const m = document.getElementById('notif-text').textContent, id = activeNotifId;
    document.getElementById('notif-popup').classList.add('hidden'); 
    activeNotifId = null;
    setTimeout(() => triggerNotif(m, id), 60000);
}

// --- FLAPPY BIRD ---
const cvs = document.getElementById('flappy-canvas'), ctx = cvs.getContext('2d');
let bird, pipes, score, loop;

function typePin(n) {
    if (currentPin.length < 4) currentPin += n;
    document.getElementById('pin-display').textContent = currentPin.padEnd(4, '_');
    if (currentPin === '2345') { 
        setTimeout(() => { closeModals(); startFlappy(); }, 200); 
    }
}

function clearPin() { currentPin = ''; document.getElementById('pin-display').textContent = '____'; }
function openPinPad() { currentPin = ''; clearPin(); document.getElementById('pin-modal').classList.remove('hidden'); }

function startFlappy() {
    document.getElementById('flappy-container').style.display = 'flex';
    bird = { x: 50, y: 300, v: 0, w: 35, h: 25 };
    pipes = []; score = 0; document.getElementById('live-score').textContent = 0;
    spawnPipe();
    if(loop) clearInterval(loop);
    loop = setInterval(drawFlappy, 20);
    window.addEventListener('keydown', flap);
}

function flap(e) { if(e.code === 'Space') bird.v = -7.5; }
function spawnPipe() {
    const gap = 180;
    const y = Math.random() * (cvs.height - gap - 100) + 50;
    pipes.push({ x: cvs.width, y, gap, passed: false });
}

function drawFlappy() {
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,cvs.width,cvs.height);
    bird.v += 0.45; bird.y += bird.v;
    ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.roundRect(bird.x, bird.y, bird.w, bird.h, 5); ctx.fill();

    pipes.forEach((p, i) => {
        p.x -= 3;
        ctx.fillStyle = '#10b981';
        ctx.fillRect(p.x, 0, 50, p.y);
        ctx.fillRect(p.x, p.y + p.gap, 50, cvs.height);

        if (!p.passed && bird.x > p.x + 50) { score++; p.passed = true; document.getElementById('live-score').textContent = score; }
        if(bird.x + bird.w > p.x && bird.x < p.x + 50 && (bird.y < p.y || bird.y + bird.h > p.y + p.gap)) closeFlappy();
    });

    if(pipes[0].x < -50) pipes.shift();
    if(pipes[pipes.length-1].x < cvs.width - 250) spawnPipe();
    if(bird.y + bird.h > cvs.height || bird.y < 0) closeFlappy();
}

function closeFlappy() { 
    clearInterval(loop); 
    document.getElementById('flappy-container').style.display = 'none'; 
    showToast(`Session Ended. Score: ${score}`); 
}

// --- UTILS ---
function renderAll() { renderTimetable(); renderTasks(); }
function closeModals() { document.querySelectorAll('.modal-backdrop').forEach(m => { if(m.id !== 'auth-page') m.classList.add('hidden'); }); }

function askConfirm(t, c) {
    // We can keep the confirm modal because it requires a specific "Yes/No" interaction 
    // that a toast cannot provide.
    const m = document.getElementById('confirm-modal');
    if (!m) { // Safety if missing
        const modal = document.createElement('div');
        modal.id = 'confirm-modal';
        modal.className = 'modal-backdrop';
        modal.innerHTML = `<div class="glass p-8 rounded-3xl w-80 text-center"><h2 class="text-xl font-bold mb-6 italic">${t}</h2><div class="flex gap-2"><button id="confirm-yes" class="flex-1 bg-red-500 py-3 rounded-xl font-bold">Yes</button><button onclick="closeModals()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold">No</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirm-yes').onclick = () => { c(); closeModals(); };
    } else {
        m.classList.remove('hidden');
        document.getElementById('confirm-yes').onclick = () => { c(); closeModals(); };
    }
}
</script>
</body>
</html>
